<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Details - MC Plugin Compiler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1e;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a3e;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 30px;
            font-size: 15px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #00d4ff;
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 15px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #00d4ff;
        }

        /* Status Card */
        .status-card {
            background: linear-gradient(135deg, #1a1a3e, #16213e);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #1a1a3e;
        }

        .status-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .status-icon {
            font-size: 48px;
        }

        .status-text h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status-text p {
            color: #888;
        }

        .status-success .status-text h2 { color: #00ff88; }
        .status-failed .status-text h2 { color: #ff4444; }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            background: #0a0a1a;
            border-radius: 12px;
            padding: 18px;
        }

        .info-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
            word-break: break-all;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-primary {
            background: #00ff88;
            color: #0f0f1e;
        }

        .btn-secondary {
            background: #00d4ff;
            color: #0f0f1e;
        }

        .btn-outline {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }

        /* Logs Section */
        .logs-section {
            margin-top: 40px;
        }

        .logs-section h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .logs-container {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 25px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .logs-container::-webkit-scrollbar {
            width: 8px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: #1a1a3e;
            border-radius: 4px;
        }

        /* Error Highlight */
        .error-line {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            padding: 2px 0;
        }

        .success-line {
            color: #00ff88;
        }

        .warn-line {
            color: #ffaa00;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #555;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1a1a3e;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .not-found {
            text-align: center;
            padding: 100px 20px;
        }

        .not-found h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .navbar { padding: 12px 15px; }
            .nav-links a { margin-left: 15px; font-size: 13px; }
            .status-header { flex-direction: column; text-align: center; }
            .actions { justify-content: center; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">⚡ MC Plugin Compiler</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/compiler">Compiler</a>
        </div>
    </nav>

    <div class="container">
        <a href="/compiler" class="back-link">← Back to Compiler</a>

        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading build details...</p>
            </div>
        </div>
    </div>

    <script>
        const buildId = window.location.pathname.split('/').pop();

        async function loadBuildDetails() {
            const content = document.getElementById('content');

            try {
                const res = await fetch(`/api/build/${buildId}`);
                const data = await res.json();

                if (!data.success) {
                    content.innerHTML = `
                        <div class="not-found">
                            <h2>🔍</h2>
                            <h3>Build Not Found</h3>
                            <p style="color:#666; margin-top:10px;">This build may have been deleted or never existed.</p>
                        </div>
                    `;
                    return;
                }

                const build = data.build;
                const isSuccess = build.status === 'success';
                const date = new Date(build.timestamp);

                content.innerHTML = `
                    <h1>📋 Build Details</h1>

                    <div class="status-card ${isSuccess ? 'status-success' : 'status-failed'}">
                        <div class="status-header">
                            <div class="status-icon">${isSuccess ? '✅' : '❌'}</div>
                            <div class="status-text">
                                <h2>${isSuccess ? 'Build Successful' : 'Build Failed'}</h2>
                                <p>${build.filename}</p>
                            </div>
                        </div>

                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Build ID</div>
                                <div class="info-value">${build.id.substring(0, 8)}...</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Build Type</div>
                                <div class="info-value">${build.buildType}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Date & Time</div>
                                <div class="info-value">${date.toLocaleString()}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Duration</div>
                                <div class="info-value">${build.buildTime ? (build.buildTime/1000).toFixed(2) + 's' : 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Status</div>
                                <div class="info-value" style="color: ${isSuccess ? '#00ff88' : '#ff4444'}">
                                    ${isSuccess ? '✅ Success' : '❌ Failed'}
                                </div>
                            </div>
                            ${build.jarName ? `
                            <div class="info-item">
                                <div class="info-label">Output File</div>
                                <div class="info-value">${build.jarName}</div>
                            </div>
                            ` : ''}
                        </div>

                        <div class="actions">
                            ${build.downloadUrl ? `
                                <a href="${build.downloadUrl}" class="btn btn-primary" download>⬇️ Download JAR</a>
                            ` : ''}
                            <a href="/compiler" class="btn btn-secondary">🚀 New Build</a>
                            <button class="btn btn-outline" onclick="copyLogs()">📋 Copy Logs</button>
                        </div>
                    </div>

                    <div class="logs-section">
                        <h3>📝 Full Build Logs</h3>
                        <div class="logs-container" id="logsContainer">${escapeHtml(build.logs || 'No logs available')}</div>
                    </div>
                `;

                // Colorize logs
                colorizeLogs();

            } catch(e) {
                content.innerHTML = `
                    <div class="not-found">
                        <h2>⚠️</h2>
                        <h3>Error Loading Build</h3>
                        <p style="color:#666; margin-top:10px;">${e.message}</p>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function colorizeLogs() {
            const container = document.getElementById('logsContainer');
            if (!container) return;

            let html = container.innerHTML;

            // Highlight errors
            html = html.replace(/(ERROR|FAILED|Exception|error|failed)/gi, 
                '<span class="error-line">$1</span>');

            // Highlight success
            html = html.replace(/(BUILD SUCCESS|SUCCESS|successful)/gi, 
                '<span class="success-line">$1</span>');

            // Highlight warnings
            html = html.replace(/(WARNING|WARN)/gi, 
                '<span class="warn-line">$1</span>');

            container.innerHTML = html;
        }

        function copyLogs() {
            const logs = document.getElementById('logsContainer').textContent;
            navigator.clipboard.writeText(logs).then(() => {
                alert('Logs copied to clipboard!');
            });
        }

        loadBuildDetails();
    </script>
</body>
</html>
